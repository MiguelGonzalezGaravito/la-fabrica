# Servidor
server.port=${PORT:8080}

# Base de datos (Railway inyecta DATABASE_URL automáticamente)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Pago Bancolombia
payment.bancolombia.llave=${BANCOLOMBIA_LLAVE}
payment.bancolombia.titular=${BANCOLOMBIA_TITULAR}
payment.bancolombia.qr-image-url=${BANCOLOMBIA_QR_URL}

# Archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# CORS — URL del frontend en Vercel
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
